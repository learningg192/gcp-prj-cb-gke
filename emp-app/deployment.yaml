apiVersion: apps/v1
kind: Deployment
metadata:
  name: emp-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: emp-app
  template:
    metadata:
      labels:
        app: emp-app
    spec:
      containers:
      - name: emp-app
        image: us-central1-docker.pkg.dev/ams-kap/emp-app-repo/emp-app:latest
        ports:
        - containerPort: 80
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD
